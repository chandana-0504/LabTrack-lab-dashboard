<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Alerts – BioDash</title>

  <link rel="stylesheet" href="/static/css/style.css">

  <style>
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); }
    th { background: var(--bg2); text-align: left; }
  </style>
</head>

<body>

<nav>
  <div class="brand" onclick="location.href='/'">BioDash</div>
  <div class="links">
    <a href="/">Dashboard</a>
    <a href="/experiments">Experiments</a>
    <a class="active" href="/alerts">Alerts</a>
    <button id="logoutBtn">Logout</button>
    <button id="darkToggle">🌙</button>
  </div>
</nav>

<div class="container">

  <div class="card">
    <h2>Active Alerts</h2>

    <table id="alertsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Experiment</th>
          <th>Message</th>

          <!-- only row-data fields -->
          <th>Sample</th>
          <th>Parameter</th>
          <th>Value</th>
          <th>Entry Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<div id="toast"></div>

<script src="/static/js/main.js"></script>

<script>
window.initAlertsPage = async () => {
  setupDarkToggle();
  bindLogoutBtn();

  const tb = document.querySelector("#alertsTable tbody");

  async function loadAlerts() {
    const r = await apiFetch("/api/live-alerts");

    if (!r.ok) {
      tb.innerHTML = `<tr><td colspan="7">Failed to load alerts</td></tr>`;
      return;
    }

    const rows = r.data;
    if (!rows.length) {
      tb.innerHTML = `<tr><td colspan="7">No active alerts</td></tr>`;
      return;
    }

    tb.innerHTML = rows.map((a, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${escapeHtml(a.experiment)}</td>
        <td>${escapeHtml(a.message)}</td>

        <td>${escapeHtml(a.row.sample)}</td>
        <td>${escapeHtml(a.row.param)}</td>
        <td>${escapeHtml(a.row.value)}</td>
        <td>${escapeHtml(a.row.entry_time)}</td>
      </tr>
    `).join("");
  }

  loadAlerts();
  setInterval(loadAlerts, 4000);
};

window.initAlertsPage();
</script>

</body>
</html>
